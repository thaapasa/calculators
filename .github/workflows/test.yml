name: Test Calculators

on: [workflow_dispatch, push]

jobs:
  build:
    name: Build and test calculators
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install deps
        run: yarn install

      - name: Lint
        run: echo "Lint skipped - yarn lint"

      - name: Run tests
        run: yarn test
