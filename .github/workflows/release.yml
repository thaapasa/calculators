name: Release Docker image

on:
  workflow_dispatch:

jobs:
  release:
    name: Build and push image to GHCR
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not read version from package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if version already published
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        run: |
          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "::error::Image $IMAGE already exists in GHCR — bump package.json version before releasing."
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} not yet published, proceeding."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag released commit
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" "${{ github.sha }}"
          git push origin "$TAG"
